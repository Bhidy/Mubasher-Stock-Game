name: 🚀 Auto Pipeline — News + Deploy

# ═══════════════════════════════════════════════════════
# This pipeline is FULLY AUTOMATED and SELF-HEALING:
# - Refreshes its own Cloudflare auth token before every deploy
# - No manual tokens, no expiry issues, runs forever
# - News scraped every 10 minutes automatically
# - Every code push auto-deploys to production
# ═══════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/10 * * * *'   # Every 10 minutes (news scraping)
    - cron: '*/30 * * * *'   # Every 30 minutes (price pump)
  workflow_dispatch:           # Manual trigger anytime

permissions:
  contents: write
  # secrets: write is removed because GH_PAT handles it instead

jobs:

  # ─────────────────────────────────────────────────────
  # JOB A: Scrape fresh news (runs on schedule/manual)
  # Skipped on push — keeps deploy fast
  # ─────────────────────────────────────────────────────
  scrape-news:
    name: 📰 Scrape News
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --prefer-offline --silent

      - name: Run scraper
        run: |
          node backend/jobs/newsScraper.js
          node restore_news.cjs
          node backend/jobs/scrapeUSNews.js
          echo "Done. Stats:"
          node -e "
            const sa = require('./public/data/news_SA.json');
            const eg = require('./public/data/news_EG.json');
            const us = require('./public/data/news_US.json');
            console.log('SA:', sa.length, '| Latest:', sa[0]?.published_at);
            console.log('EG:', eg.length, '| Latest:', eg[0]?.published_at);
            console.log('US:', us.length, '| Latest:', us[0]?.published_at);
          "

      - name: Commit data
        run: |
          git config user.name "Bhidy News Bot"
          git config user.email "bot@bhidy.app"
          git add public/data/news_SA.json public/data/news_EG.json public/data/news_US.json
          git diff --staged --quiet && echo "No new articles" || (
            COUNT=$(git diff --staged --stat | grep -oP '\d+(?= insertion)' || echo 0)
            git commit -m "📰 News: $(date -u '+%H:%M UTC') — $COUNT new lines [skip ci]"
            # Retry loop: handles concurrent push conflicts from parallel schedule jobs
            for i in 1 2 3 4 5; do
              git pull --rebase origin main --quiet && git push --quiet && break || (
                echo "Push attempt $i failed, retrying in $((RANDOM % 10 + 5))s..."
                sleep $((RANDOM % 10 + 5))
              )
            done
          )

  # ─────────────────────────────────────────────────────
  # JOB B: Pump Live Prices (runs every 30 min + manual)
  # Fetches quotes for all markets, writes stocks.json
  # ─────────────────────────────────────────────────────
  pump-prices:
    name: 📈 Pump Stock Prices
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --prefer-offline --silent

      - name: Run price pump
        run: |
          node backend/jobs/pumpPrices.js
          echo "Price pump complete. Sample:"
          node -e "
            const d = require('./public/data/stocks.json');
            const sa = d['SA'] || []; const us = d['US'] || []; const eg = d['EG'] || [];
            console.log('SA:', sa.length, 'stocks | latest:', sa[0]?.lastUpdated?.substring(0,19));
            console.log('US:', us.length, 'stocks | latest:', us[0]?.lastUpdated?.substring(0,19));
            console.log('EG:', eg.length, 'stocks | latest:', eg[0]?.lastUpdated?.substring(0,19));
          "

      - name: Commit prices
        run: |
          git config user.name "Bhidy Price Bot"
          git config user.email "bot@bhidy.app"
          git add public/data/stocks.json
          git diff --staged --quiet && echo "No price changes" || (
            MARKETS=$(node -e "const d=require('./public/data/stocks.json'); console.log(Object.keys(d).filter(k=>k!=='Global').length)" 2>/dev/null || echo "?")
            git commit -m "📈 Prices: $(date -u '+%H:%M UTC') — ${MARKETS} markets [skip ci]"
            # Retry loop: handles concurrent push conflicts from parallel schedule jobs
            for i in 1 2 3 4 5; do
              git pull --rebase origin main --strategy-option=theirs --quiet && git push --quiet && break || (
                echo "Push attempt $i failed, retrying in $((RANDOM % 10 + 5))s..."
                sleep $((RANDOM % 10 + 5))
              )
            done
          )

  # ─────────────────────────────────────────────────────
  # JOB C: Build & Deploy (runs on every push to main)
  # Uses a static Cloudflare API token stored in secrets.
  # To rotate: generate a new token in Cloudflare Dashboard
  # → My Profile → API Tokens → Create Token (Pages:Edit)
  # and update the CLOUDFLARE_API_TOKEN repo secret.
  # ─────────────────────────────────────────────────────
  deploy:
    name: ☁️ Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: |
          npm run build
          echo "✅ Build complete ($(du -sh dist | cut -f1))"

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy dist \
            --project-name=bhidy-app \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify Production
        run: |
          echo "⏳ Checking production..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bhidy-app.pages.dev/)
          NEWS=$(curl -s https://bhidy-app.pages.dev/api/news?market=SA | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(f'{len(d)} articles, latest: {d[0][\"time\"][:10] if d else \"none\"}')" 2>/dev/null || echo "checking...")
          echo ""
          echo "═══════════════════════════════════════"
          echo "✅ DEPLOYED SUCCESSFULLY"
          echo "   App:    https://bhidy-app.pages.dev"
          echo "   Admin:  https://bhidy-app.pages.dev/admin"
          echo "   Status: HTTP $STATUS"
          echo "   News:   $NEWS"
          echo "═══════════════════════════════════════"
