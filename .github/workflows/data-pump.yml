name: 🚀 Auto Pipeline — News + Deploy

# ═══════════════════════════════════════════════════════
# This pipeline is FULLY AUTOMATED and SELF-HEALING:
# - Refreshes its own Cloudflare auth token before every deploy
# - No manual tokens, no expiry issues, runs forever
# - News scraped every 10 minutes automatically
# - Every code push auto-deploys to production
# ═══════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/10 * * * *'   # Every 10 minutes (news scraping)
  workflow_dispatch:           # Manual trigger anytime

permissions:
  contents: write
  # secrets: write is removed because GH_PAT handles it instead

jobs:

  # ─────────────────────────────────────────────────────
  # JOB A: Scrape fresh news (runs on schedule/manual)
  # Skipped on push — keeps deploy fast
  # ─────────────────────────────────────────────────────
  scrape-news:
    name: 📰 Scrape News
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --prefer-offline --silent

      - name: Run scraper
        run: |
          node backend/jobs/newsScraper.js
          node restore_news.cjs
          echo "Done. Stats:"
          node -e "
            const sa = require('./public/data/news_SA.json');
            const eg = require('./public/data/news_EG.json');
            console.log('SA:', sa.length, '| Latest:', sa[0]?.published_at);
            console.log('EG:', eg.length, '| Latest:', eg[0]?.published_at);
          "

      - name: Commit data
        run: |
          git config user.name "Bhidy News Bot"
          git config user.email "bot@bhidy.app"
          git add public/data/news_SA.json public/data/news_EG.json public/data/news_US.json
          git diff --staged --quiet && echo "No new articles" || (
            COUNT=$(git diff --staged --stat | grep -oP '\d+(?= insertion)' || echo 0)
            git commit -m "📰 News: $(date -u '+%H:%M UTC') — $COUNT new lines [skip ci]"
            git pull --rebase origin main --quiet || true
            git push --quiet
          )

  # ─────────────────────────────────────────────────────
  # JOB B: Build & Deploy (runs on every push to main)
  # Self-healing: refreshes Cloudflare token automatically
  # ─────────────────────────────────────────────────────
  deploy:
    name: ☁️ Deploy to Production
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci

      - name: Build
        run: |
          npm run build
          echo "✅ Build complete ($(du -sh dist | cut -f1))"

      # ── Self-Healing Token Refresh ────────────────────
      # Exchanges refresh_token → fresh access_token every deploy.
      # No expiry issues ever. Rotates itself automatically.
      - name: Refresh Cloudflare Token
        id: refresh
        run: |
          echo "🔄 Refreshing Cloudflare auth token..."
          RESPONSE=$(curl -s -X POST "https://dash.cloudflare.com/oauth2/token" \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data-urlencode "grant_type=refresh_token" \
            --data-urlencode "client_id=54d11594-84e4-41aa-b438-e81b8fa78ee7" \
            --data-urlencode "refresh_token=${{ secrets.CLOUDFLARE_REFRESH_TOKEN }}")

          ACCESS_TOKEN=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('access_token', ''))")
          NEW_REFRESH=$(echo "$RESPONSE" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('refresh_token', ''))")

          if [ -z "$ACCESS_TOKEN" ]; then
            echo "❌ Token refresh failed! Response: $RESPONSE"
            exit 1
          fi

          echo "✅ Got fresh access token"
          echo "ACCESS_TOKEN=$ACCESS_TOKEN" >> $GITHUB_OUTPUT
          echo "NEW_REFRESH=$NEW_REFRESH" >> $GITHUB_OUTPUT

      # Store rotated refresh token back so next deploy works too
      - name: Rotate Refresh Token in Secrets
        if: steps.refresh.outputs.NEW_REFRESH != ''
        run: |
          echo "${{ steps.refresh.outputs.NEW_REFRESH }}" | \
            gh secret set CLOUDFLARE_REFRESH_TOKEN --repo ${{ github.repository }}
          echo "✅ Refresh token rotated for next deploy"
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy dist \
            --project-name=bhidy-app \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ steps.refresh.outputs.ACCESS_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify Production
        run: |
          echo "⏳ Checking production..."
          sleep 15
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bhidy-app.pages.dev/)
          NEWS=$(curl -s https://bhidy-app.pages.dev/api/news?market=SA | \
            python3 -c "import sys,json; d=json.load(sys.stdin); print(f'{len(d)} articles, latest: {d[0][\"time\"][:10] if d else \"none\"}')" 2>/dev/null || echo "checking...")
          echo ""
          echo "═══════════════════════════════════════"
          echo "✅ DEPLOYED SUCCESSFULLY"
          echo "   App:    https://bhidy-app.pages.dev"
          echo "   Admin:  https://bhidy-app.pages.dev/admin"
          echo "   Status: HTTP $STATUS"
          echo "   News:   $NEWS"
          echo "═══════════════════════════════════════"
