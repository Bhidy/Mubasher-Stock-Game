name: 🚀 CI/CD Pipeline

# ─────────────────────────────────────────────────────────
# TRIGGERS
# ─────────────────────────────────────────────────────────
on:
  push:
    branches: [main]                # Deploy on every push to main
  schedule:
    - cron: '*/10 * * * *'          # Scrape fresh news every 10 minutes
  workflow_dispatch:                 # Manual trigger

# ─────────────────────────────────────────────────────────
# PERMISSIONS
# ─────────────────────────────────────────────────────────
permissions:
  contents: write

jobs:

  # ═══════════════════════════════════════════════════════
  # JOB 1: News Scraper (runs on schedule + manual)
  # Skips on push events to keep deploys fast
  # ═══════════════════════════════════════════════════════
  scrape-news:
    name: 📰 Scrape & Commit News
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci --prefer-offline

      - name: Scrape News
        run: |
          echo "🕷️ Scraping news..."
          node backend/jobs/newsScraper.js
          node restore_news.cjs

      - name: Show Stats
        run: |
          node -e "
            const sa = require('./public/data/news_SA.json');
            const eg = require('./public/data/news_EG.json');
            console.log('SA:', sa.length, 'articles | Latest:', sa[0]?.published_at || 'N/A');
            console.log('EG:', eg.length, 'articles | Latest:', eg[0]?.published_at || 'N/A');
          "

      - name: Stock Data (optional)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python3 backend/ingest_master.py 2>/dev/null || echo "Stocks skipped"
        continue-on-error: true

      - name: Commit & Push Data
        run: |
          git config user.name "Bhidy Data Bot"
          git config user.email "data-bot@bhidy.app"
          git add public/data/
          git diff --staged --quiet && echo "No changes" || (
            git commit -m "📊 Data: Fresh news $(date -u '+%H:%M UTC') [skip ci]"
            git pull --rebase origin main || true
            git push && echo "✅ Pushed"
          )

  # ═══════════════════════════════════════════════════════
  # JOB 2: Build & Deploy to Cloudflare Pages
  # Runs ONLY on push to main (not on schedule)
  # ═══════════════════════════════════════════════════════
  deploy:
    name: ☁️ Build & Deploy
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: |
          npm run build
          echo "Build output:"
          ls dist/

      - name: Deploy to Cloudflare Pages
        run: |
          npx wrangler pages deploy dist \
            --project-name=bhidy-app \
            --commit-dirty=true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Verify Live
        run: |
          echo "Waiting for propagation..."
          sleep 20
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://bhidy-app.pages.dev/api/news?market=SA)
          echo "API status: HTTP $STATUS"
          DATE=$(curl -s -H "Accept: application/json" https://bhidy-app.pages.dev/api/news?market=SA \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['time'][:10] if d else 'empty')")
          echo "Latest news date: $DATE"
          echo ""
          echo "✅ Live at: https://bhidy-app.pages.dev"
          echo "🔧 Admin:  https://bhidy-app.pages.dev/admin"
