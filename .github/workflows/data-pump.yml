name: 📰 Data Pipeline

# ═══════════════════════════════════════════════════════
# This pipeline is purely for scraping and data ingestion.
# Deployment is handled natively by Cloudflare Pages on push.
# ═══════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-news:
    name: 📰 Scrape & Commit News
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install
        run: npm ci --prefer-offline --silent

      - name: Run scraper
        run: |
          node backend/jobs/newsScraper.js
          node restore_news.cjs

      - name: Commit data
        run: |
          git config user.name "Bhidy News Bot"
          git config user.email "bot@bhidy.app"
          git add public/data/news_*.json
          git diff --staged --quiet && echo "No new articles" || (
            COUNT=$(git diff --staged --stat | grep -oP '\d+(?= insertion)' || echo 0)
            git commit -m "📰 News: $(date -u '+%H:%M UTC') — $COUNT new lines [skip ci]"
            git pull --rebase origin main --quiet || true
            git push --quiet
          )
